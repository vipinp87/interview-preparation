<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="992" viewBox="0 0 1520 992" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1d4ed8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1520" height="992" fill="#f8fafc"/>

  <!-- Title -->
  <text x="40" y="44" font-size="28" font-weight="700" fill="#0f172a">BookMyShow — Movie Ticket Booking — Backend Architecture</text>
  <text x="40" y="70" font-size="14.5" fill="#475569">Guarantee exclusive ownership of a tiny, hot set of seats while a human takes minutes to pay — atomically across a multi-seat booking, never oversold.</text>

  <!-- ============ BAND ① CLIENT ============ -->
  <rect x="40" y="90" width="1440" height="78" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="58" y="114" font-size="13" font-weight="700" fill="#4338ca" letter-spacing="1">① CLIENT TIER</text>
  <g filter="url(#shadow)"><rect x="590" y="100" width="340" height="56" rx="10" fill="#ffffff" stroke="#818cf8"/></g>
  <text x="760" y="125" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">Mobile / Web app</text>
  <text x="760" y="144" font-size="11.5" fill="#64748b" text-anchor="middle">browse → pick seats → hold → pay → e-ticket</text>
  <text x="1130" y="122" font-size="12" font-weight="600" fill="#4338ca">millions of opens / evening</text>
  <text x="1130" y="140" font-size="12" fill="#64748b">concentrated on a few big shows</text>

  <!-- client -> edge -->
  <line x1="760" y1="156" x2="760" y2="174" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ BAND ② EDGE & ROUTING ============ -->
  <rect x="40" y="174" width="1440" height="146" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="58" y="198" font-size="13" font-weight="700" fill="#0e7490" letter-spacing="1">② EDGE &amp; ROUTING — split the huge read path from the exact write path</text>

  <g filter="url(#shadow)"><rect x="64" y="212" width="290" height="94" rx="10" fill="#ffffff" stroke="#22d3ee"/></g>
  <text x="209" y="238" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">CDN / Edge cache</text>
  <text x="209" y="260" font-size="11" fill="#64748b" text-anchor="middle">posters · trailers · static pages</text>
  <text x="209" y="276" font-size="11" fill="#64748b" text-anchor="middle">seat-map snapshot (approx)</text>
  <text x="209" y="292" font-size="11" fill="#64748b" text-anchor="middle">"seats-left" badge (cosmetic)</text>

  <g filter="url(#shadow)"><rect x="392" y="212" width="300" height="94" rx="10" fill="#ffffff" stroke="#22d3ee"/></g>
  <text x="542" y="238" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">API Gateway + L7 Load Balancer</text>
  <text x="542" y="260" font-size="11" fill="#64748b" text-anchor="middle">auth · per-IP/device rate-limit</text>
  <text x="542" y="276" font-size="11" fill="#64748b" text-anchor="middle">content-aware routing</text>
  <text x="542" y="292" font-size="11" fill="#64748b" text-anchor="middle">per-user hold cap (anti-scalp)</text>

  <g filter="url(#shadow)"><rect x="730" y="212" width="360" height="94" rx="10" fill="#fff7ed" stroke="#fb923c"/></g>
  <text x="910" y="238" font-size="13.5" font-weight="700" fill="#9a3412" text-anchor="middle">CONTENT-AWARE ROUTING</text>
  <text x="910" y="262" font-size="11" fill="#7c2d12" text-anchor="middle">browse → large read fleet (cacheable)</text>
  <text x="910" y="280" font-size="11" fill="#7c2d12" text-anchor="middle">book / pay → guarded transactional fleet</text>
  <text x="910" y="296" font-size="10.5" fill="#9a3412" text-anchor="middle">L4 can't do this — routes by content</text>

  <g filter="url(#shadow)"><rect x="1128" y="212" width="330" height="94" rx="10" fill="#f0fdf4" stroke="#4ade80"/></g>
  <text x="1293" y="238" font-size="13.5" font-weight="700" fill="#15803d" text-anchor="middle">THE ONE INVARIANT</text>
  <text x="1293" y="262" font-size="11" fill="#166534" text-anchor="middle">a seat is sold to exactly one person, ever,</text>
  <text x="1293" y="280" font-size="11" fill="#166534" text-anchor="middle">for that show — never two.</text>
  <text x="1293" y="296" font-size="10.5" fill="#15803d" text-anchor="middle">read path is a hint; the write path is truth</text>

  <!-- gateway split: read (down-left) and book (down-right) -->
  <path d="M480,306 L480,330 L210,330 L210,356" fill="none" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="330" y="345" font-size="10.5" font-weight="600" fill="#1d4ed8" text-anchor="middle">browse (read)</text>
  <path d="M604,306 L604,330 L620,330 L620,356" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="668" y="345" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">book (write)</text>

  <!-- ============ READ PATH (left lane) ============ -->
  <text x="210" y="374" font-size="10.5" font-weight="700" fill="#1d4ed8" text-anchor="middle" letter-spacing="1">③ READ PATH — HIGH VOLUME, CACHEABLE, STALENESS-TOLERANT</text>

  <g filter="url(#shadow)"><rect x="75" y="384" width="270" height="58" rx="10" fill="#ffffff" stroke="#60a5fa"/></g>
  <text x="210" y="409" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">Browse Service</text>
  <text x="210" y="428" font-size="11" fill="#64748b" text-anchor="middle">movies · theaters · showtimes</text>

  <line x1="210" y1="442" x2="210" y2="470" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <g filter="url(#shadow)"><rect x="75" y="470" width="270" height="58" rx="10" fill="#ffffff" stroke="#60a5fa"/></g>
  <text x="210" y="495" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">Seat-map Service</text>
  <text x="210" y="514" font-size="11" fill="#64748b" text-anchor="middle">renders cached snapshot (approx)</text>

  <line x1="210" y1="528" x2="210" y2="556" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <g filter="url(#shadow)"><rect x="75" y="556" width="270" height="70" rx="10" fill="#eff6ff" stroke="#3b82f6"/></g>
  <text x="210" y="580" font-size="13.5" font-weight="700" fill="#1d4ed8" text-anchor="middle">Elasticsearch + cache + replicas</text>
  <text x="210" y="600" font-size="11" fill="#64748b" text-anchor="middle">fed async from Postgres</text>
  <text x="210" y="616" font-size="11" fill="#64748b" text-anchor="middle">filter-heavy, tolerant of staleness</text>

  <!-- seat-map "click to hold" goes LIVE to the booking write path -->
  <path d="M345,499 L400,499 L400,392 L466,392" fill="none" stroke="#b91c1c" stroke-width="2" stroke-dasharray="1 0" marker-end="url(#arrowRed)"/>
  <text x="407" y="512" font-size="9.5" font-weight="600" fill="#b91c1c" text-anchor="middle">"hold" click = LIVE</text>
  <text x="407" y="525" font-size="9.5" font-weight="600" fill="#b91c1c" text-anchor="middle">atomic (not cached)</text>

  <!-- ============ WRITE / BOOKING SPINE (center) ============ -->
  <text x="620" y="374" font-size="10.5" font-weight="700" fill="#15803d" text-anchor="middle" letter-spacing="1">③ WRITE PATH — BOOKING (CORRECTNESS UNDER CONTENTION)</text>

  <g filter="url(#shadow)"><rect x="470" y="384" width="300" height="62" rx="10" fill="#ffffff" stroke="#4ade80"/></g>
  <text x="620" y="409" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">Booking Service (stateless)</text>
  <text x="620" y="428" font-size="11" fill="#64748b" text-anchor="middle">acquire holds · orchestrate confirm</text>

  <!-- booking -> payment (sync) -->
  <line x1="620" y1="446" x2="620" y2="486" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="636" y="470" font-size="10.5" font-weight="600" fill="#b91c1c">all held → capture</text>

  <g filter="url(#shadow)"><rect x="470" y="486" width="300" height="70" rx="10" fill="#ffffff" stroke="#fbbf24"/></g>
  <text x="620" y="510" font-size="14.5" font-weight="700" fill="#92400e" text-anchor="middle">Payment Service</text>
  <text x="620" y="530" font-size="11" fill="#64748b" text-anchor="middle">idempotent capture (Idempotency-Key = bookingId)</text>
  <text x="620" y="546" font-size="10.5" font-weight="700" fill="#b91c1c" text-anchor="middle">re-validate hold ownership BEFORE charge</text>

  <!-- payment -> postgres (sync) -->
  <line x1="620" y1="556" x2="620" y2="596" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="636" y="580" font-size="10.5" font-weight="600" fill="#b91c1c">capture ok → CONFIRM</text>

  <g filter="url(#shadow)"><rect x="470" y="596" width="300" height="70" rx="10" fill="#ffffff" stroke="#a78bfa"/></g>
  <text x="620" y="620" font-size="14.5" font-weight="700" fill="#5b21b6" text-anchor="middle">PostgreSQL — source of truth</text>
  <text x="620" y="640" font-size="11" fill="#64748b" text-anchor="middle">CONFIRM in one ACID txn (seats + booking)</text>
  <text x="620" y="656" font-size="10.5" font-weight="700" fill="#5b21b6" text-anchor="middle">UNIQUE(show_id, seat_id) — unforgeable backstop</text>

  <!-- postgres -> kafka (async) -->
  <line x1="620" y1="666" x2="620" y2="704" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="636" y="690" font-size="10.5" font-weight="600" fill="#334155">emit booking-confirmed (async)</text>

  <g filter="url(#shadow)"><rect x="470" y="704" width="300" height="60" rx="10" fill="#ffffff" stroke="#c084fc"/></g>
  <text x="620" y="726" font-size="10.5" font-weight="700" fill="#7e22ce" text-anchor="middle" letter-spacing="1">⑤ ASYNC BACKBONE — EVENTUAL</text>
  <text x="620" y="744" font-size="13.5" font-weight="700" fill="#6b21a8" text-anchor="middle">Kafka: booking-confirmed</text>
  <text x="620" y="759" font-size="10.5" fill="#64748b" text-anchor="middle">partition by showId · durable · replayable</text>

  <!-- kafka -> workers -->
  <path d="M540,764 L540,792 L400,792 L400,816" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="764" x2="620" y2="816" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M700,764 L700,792 L845,792 L845,816" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- workers row -->
  <g filter="url(#shadow)"><rect x="270" y="816" width="260" height="64" rx="10" fill="#ffffff" stroke="#c084fc"/></g>
  <text x="400" y="842" font-size="13" font-weight="700" fill="#5b21b6" text-anchor="middle">Notification workers</text>
  <text x="400" y="861" font-size="10.5" fill="#64748b" text-anchor="middle">e-ticket + QR (email / SMS)</text>

  <g filter="url(#shadow)"><rect x="546" y="816" width="148" height="64" rx="10" fill="#ffffff" stroke="#c084fc"/></g>
  <text x="620" y="842" font-size="12.5" font-weight="700" fill="#5b21b6" text-anchor="middle">Analytics / BI</text>
  <text x="620" y="861" font-size="10.5" fill="#64748b" text-anchor="middle">seats-sold · revenue</text>

  <g filter="url(#shadow)"><rect x="710" y="816" width="205" height="64" rx="10" fill="#ffffff" stroke="#c084fc"/></g>
  <text x="812" y="842" font-size="12.5" font-weight="700" fill="#5b21b6" text-anchor="middle">Search-index / badge</text>
  <text x="812" y="861" font-size="10.5" fill="#64748b" text-anchor="middle">refresh seats-left</text>

  <!-- ============ ④ REDIS SEAT-HOLD ARBITER (right, sync side dependency) ============ -->
  <rect x="800" y="380" width="450" height="300" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="820" y="405" font-size="14" font-weight="700" fill="#b91c1c">④ SEAT-HOLD ARBITER — Redis (sharded by showId)</text>
  <text x="820" y="423" font-size="10.5" fill="#b91c1c">strong / linearizable per key · sub-ms · SET NX EX = self-expiring hold, no sweeper</text>

  <!-- per-seat lock -->
  <g filter="url(#shadow)"><rect x="816" y="434" width="418" height="58" rx="9" fill="#ffffff" stroke="#f87171"/></g>
  <text x="1025" y="456" font-size="12.5" font-weight="700" fill="#991b1b" text-anchor="middle">Per-seat lock (atomic)</text>
  <text x="1025" y="476" font-size="11" fill="#334155" text-anchor="middle">SET lock:{showId}:{seatId} = userId  NX EX 180</text>

  <!-- all-or-nothing -->
  <g filter="url(#shadow)"><rect x="816" y="500" width="204" height="76" rx="9" fill="#ffffff" stroke="#f87171"/></g>
  <text x="918" y="522" font-size="12" font-weight="700" fill="#991b1b" text-anchor="middle">All-or-nothing</text>
  <text x="918" y="540" font-size="9.8" fill="#64748b" text-anchor="middle">acquire seats in sorted</text>
  <text x="918" y="554" font-size="9.8" fill="#64748b" text-anchor="middle">ID order (no deadlock)</text>
  <text x="918" y="568" font-size="9.8" fill="#64748b" text-anchor="middle">partial → rollback acquired</text>

  <!-- scalp guard -->
  <g filter="url(#shadow)"><rect x="1030" y="500" width="204" height="76" rx="9" fill="#ffffff" stroke="#f87171"/></g>
  <text x="1132" y="522" font-size="12" font-weight="700" fill="#991b1b" text-anchor="middle">Anti-scalp cap</text>
  <text x="1132" y="540" font-size="9.8" fill="#64748b" text-anchor="middle">user_hold_count:</text>
  <text x="1132" y="554" font-size="9.8" fill="#64748b" text-anchor="middle">{userId}:{showId}</text>
  <text x="1132" y="568" font-size="9.8" fill="#64748b" text-anchor="middle">≤ maxSeats per booking</text>

  <!-- state machine strip -->
  <rect x="816" y="584" width="418" height="42" rx="8" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="1025" y="601" font-size="10.5" font-weight="700" fill="#9f1239" text-anchor="middle">seat state machine (per show)</text>
  <text x="1025" y="617" font-size="10.5" fill="#334155" text-anchor="middle">AVAILABLE → HELD → CONFIRMED   ·   TTL expires → AVAILABLE</text>

  <!-- correctness callout -->
  <rect x="816" y="634" width="418" height="38" rx="8" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="1025" y="651" font-size="10.5" font-weight="700" fill="#b91c1c" text-anchor="middle">⚠ hold TTL may expire mid-payment</text>
  <text x="1025" y="666" font-size="10" fill="#7f1d1d" text-anchor="middle">re-check GET lock == userId right before capture — never charge on a lost hold</text>

  <!-- booking <-> redis: synchronous hot path (red, double-headed) -->
  <text x="785" y="392" font-size="10" font-weight="700" fill="#b91c1c" text-anchor="middle">acquire holds</text>
  <text x="785" y="405" font-size="10" font-weight="700" fill="#b91c1c" text-anchor="middle">SET NX ⇄ result</text>
  <line x1="770" y1="415" x2="800" y2="415" stroke="#b91c1c" stroke-width="2.5" marker-start="url(#arrowRed)" marker-end="url(#arrowRed)"/>

  <!-- re-validate link from Payment to Redis -->
  <path d="M770,521 L788,521 L788,655 L816,655" fill="none" stroke="#b91c1c" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrowRed)"/>

  <!-- ============ AUX / BATCH column (far right) ============ -->
  <rect x="1266" y="380" width="214" height="300" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="1373" y="404" font-size="12.5" font-weight="700" fill="#334155" letter-spacing="1" text-anchor="middle">AUX / BATCH</text>

  <g filter="url(#shadow)"><rect x="1280" y="416" width="186" height="76" rx="9" fill="#ffffff" stroke="#94a3b8"/></g>
  <text x="1373" y="438" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Seats-left badge</text>
  <text x="1373" y="456" font-size="9.5" fill="#64748b" text-anchor="middle">total − count(HELD|CONFIRMED)</text>
  <text x="1373" y="470" font-size="9.5" fill="#64748b" text-anchor="middle">on a 1–2s timer → CDN</text>
  <text x="1373" y="484" font-size="9.5" fill="#94a3b8" text-anchor="middle">never reads live seat keys</text>

  <g filter="url(#shadow)"><rect x="1280" y="500" width="186" height="76" rx="9" fill="#ffffff" stroke="#94a3b8"/></g>
  <text x="1373" y="522" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Hold expiry</text>
  <text x="1373" y="540" font-size="9.5" fill="#64748b" text-anchor="middle">TTL auto-frees the seat</text>
  <text x="1373" y="554" font-size="9.5" fill="#64748b" text-anchor="middle">(self-healing, zero code)</text>
  <text x="1373" y="568" font-size="9.5" fill="#94a3b8" text-anchor="middle">keyspace-notify → badge</text>

  <g filter="url(#shadow)"><rect x="1280" y="584" width="186" height="88" rx="9" fill="#ffffff" stroke="#94a3b8"/></g>
  <text x="1373" y="606" font-size="12" font-weight="700" fill="#0f172a" text-anchor="middle">Saga / outbox reconcile</text>
  <text x="1373" y="624" font-size="9.5" fill="#64748b" text-anchor="middle">PENDING_CONFIRM before pay;</text>
  <text x="1373" y="638" font-size="9.5" fill="#64748b" text-anchor="middle">gateway txn log vs booking</text>
  <text x="1373" y="652" font-size="9.5" fill="#64748b" text-anchor="middle">state → complete or refund</text>
  <text x="1373" y="666" font-size="9.5" fill="#94a3b8" text-anchor="middle">no "charged, no seat"</text>

  <!-- dashed links: aux <-> redis panel -->
  <line x1="1280" y1="454" x2="1250" y2="470" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>
  <line x1="1280" y1="538" x2="1250" y2="540" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>

  <!-- ============ LEGEND (horizontal, bottom) ============ -->
  <g transform="translate(40,904)">
    <rect x="0" y="0" width="1440" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="27" font-size="13.5" font-weight="700" fill="#0f172a">Legend</text>
    <line x1="20" y1="50" x2="54" y2="50" stroke="#b91c1c" stroke-width="2.5" marker-start="url(#arrowRed)" marker-end="url(#arrowRed)"/>
    <text x="62" y="54" font-size="11.5" fill="#334155">Hot / sync path — user waits (hold + confirm)</text>
    <line x1="330" y1="50" x2="364" y2="50" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="372" y="54" font-size="11.5" fill="#334155">Read / browse — cacheable</text>
    <line x1="580" y1="50" x2="614" y2="50" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="622" y="54" font-size="11.5" fill="#334155">Async — off the critical path</text>
    <line x1="830" y1="50" x2="864" y2="50" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>
    <text x="872" y="54" font-size="11.5" fill="#334155">Batch / background</text>
    <text x="1055" y="30" font-size="11.5" font-weight="700" fill="#991b1b">Strong / linearizable:</text>
    <text x="1055" y="52" font-size="10.5" fill="#475569">seat hold (Redis SET NX) + CONFIRM (Postgres UNIQUE)</text>
    <text x="1055" y="66" font-size="10.5" fill="#6b21a8" font-weight="700">Eventual: badge · search · analytics · notifications</text>
  </g>
</svg>
