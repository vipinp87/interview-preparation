<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="982" viewBox="0 0 1520 982" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b91c1c"/>
    </marker>
    <marker id="arrowGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1520" height="982" fill="#f8fafc"/>

  <!-- Title -->
  <text x="40" y="44" font-size="27" font-weight="700" fill="#0f172a">Flash Sale — Fixed Inventory, Extreme Demand — Backend Architecture</text>
  <text x="40" y="70" font-size="14.5" fill="#475569">Sell exactly 5,000 units under a ~170k/s read storm + ~65k/s write spike — never oversell, feel fair, and never take down the rest of the platform.</text>

  <!-- ISOLATION boundary (drawn before boxes so it reads as a perimeter) -->
  <rect x="82" y="350" width="1106" height="504" rx="14" fill="none" stroke="#0f766e" stroke-width="1.6" stroke-dasharray="9 6"/>
  <rect x="82" y="336" width="470" height="20" rx="6" fill="#0f766e"/>
  <text x="94" y="350" font-size="11" font-weight="700" fill="#ffffff">ISOLATED FLASH-SALE STACK — own cluster + datastore (blast-radius firewall)</text>

  <!-- ============ BAND ① CLIENT ============ -->
  <rect x="40" y="88" width="1440" height="78" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="58" y="112" font-size="13" font-weight="700" fill="#4338ca" letter-spacing="1">① CLIENT TIER</text>
  <g filter="url(#shadow)"><rect x="600" y="98" width="320" height="56" rx="10" fill="#ffffff" stroke="#818cf8"/></g>
  <text x="760" y="123" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">Mobile / Web app — "Buy now"</text>
  <text x="760" y="142" font-size="11.5" fill="#64748b" text-anchor="middle">2M users refreshing at 11:59</text>
  <text x="1130" y="120" font-size="12" font-weight="600" fill="#4338ca">~20M reads / 2M taps</text>
  <text x="1130" y="138" font-size="12" fill="#64748b">in the first ~2 min</text>

  <!-- client -> edge -->
  <line x1="760" y1="154" x2="760" y2="172" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ============ BAND ② EDGE & ADMISSION ============ -->
  <rect x="40" y="172" width="1440" height="152" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="58" y="196" font-size="13" font-weight="700" fill="#0e7490" letter-spacing="1">② EDGE &amp; ADMISSION — absorb the read storm, flatten the write spike, isolate the blast radius</text>

  <g filter="url(#shadow)"><rect x="64" y="210" width="248" height="98" rx="10" fill="#ffffff" stroke="#22d3ee"/></g>
  <text x="188" y="234" font-size="13.5" font-weight="600" fill="#1e293b" text-anchor="middle">CDN — short TTL (1–2s)</text>
  <text x="188" y="256" font-size="10.5" fill="#64748b" text-anchor="middle">product page · countdown</text>
  <text x="188" y="272" font-size="10.5" fill="#64748b" text-anchor="middle">"in stock / sold out" badge</text>
  <text x="188" y="292" font-size="10.5" font-weight="600" fill="#0e7490" text-anchor="middle">170k/s reads → a few origin hits</text>

  <g filter="url(#shadow)"><rect x="328" y="210" width="248" height="98" rx="10" fill="#ffffff" stroke="#22d3ee"/></g>
  <text x="452" y="234" font-size="13.5" font-weight="600" fill="#1e293b" text-anchor="middle">Virtual Waiting Room</text>
  <text x="452" y="256" font-size="10.5" fill="#64748b" text-anchor="middle">signed queue tokens</text>
  <text x="452" y="272" font-size="10.5" fill="#64748b" text-anchor="middle">admit at a rate backend serves</text>
  <text x="452" y="292" font-size="10.5" font-weight="600" fill="#0e7490" text-anchor="middle">honest "#48,213 in line", no spinner</text>

  <g filter="url(#shadow)"><rect x="592" y="210" width="248" height="98" rx="10" fill="#ffffff" stroke="#22d3ee"/></g>
  <text x="716" y="234" font-size="13.5" font-weight="600" fill="#1e293b" text-anchor="middle">API Gateway + L7 LB</text>
  <text x="716" y="256" font-size="10.5" fill="#64748b" text-anchor="middle">rate-limit per IP / device</text>
  <text x="716" y="272" font-size="10.5" fill="#64748b" text-anchor="middle">signed tokens (no queue-skip)</text>
  <text x="716" y="292" font-size="10.5" fill="#64748b" text-anchor="middle">CAPTCHA / bot-detection</text>

  <g filter="url(#shadow)"><rect x="856" y="210" width="270" height="98" rx="10" fill="#fff7ed" stroke="#fb923c"/></g>
  <text x="991" y="236" font-size="13" font-weight="700" fill="#9a3412" text-anchor="middle">FAST-PATH SOLD_OUT</text>
  <text x="991" y="260" font-size="10.5" fill="#7c2d12" text-anchor="middle">once the sold-out flag flips,</text>
  <text x="991" y="277" font-size="10.5" fill="#7c2d12" text-anchor="middle">reject at the edge —</text>
  <text x="991" y="294" font-size="10.5" fill="#7c2d12" text-anchor="middle">never touch Redis</text>

  <g filter="url(#shadow)"><rect x="1142" y="210" width="316" height="98" rx="10" fill="#f0fdfa" stroke="#14b8a6"/></g>
  <text x="1300" y="236" font-size="13" font-weight="700" fill="#0f766e" text-anchor="middle">BLAST-RADIUS ISOLATION</text>
  <text x="1300" y="260" font-size="10.5" fill="#115e59" text-anchor="middle">flash sale runs on its OWN cluster</text>
  <text x="1300" y="277" font-size="10.5" fill="#115e59" text-anchor="middle">+ datastore — a meltdown here</text>
  <text x="1300" y="294" font-size="10.5" fill="#115e59" text-anchor="middle">never degrades the rest of the site</text>

  <!-- gateway -> flash-sale service (elbow down-left) -->
  <path d="M716,308 L716,338 L430,338 L430,362" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="332" font-size="10.5" font-weight="600" fill="#334155" text-anchor="middle">admitted at a survivable rate</text>

  <!-- ============ ③ COMPUTE (left spine) ============ -->
  <g filter="url(#shadow)"><rect x="250" y="362" width="360" height="62" rx="10" fill="#ffffff" stroke="#4ade80"/></g>
  <text x="430" y="380" font-size="10" font-weight="700" fill="#15803d" text-anchor="middle" letter-spacing="0.5">③ FLASH-SALE SERVICE — STATELESS · ISOLATED CLUSTER</text>
  <text x="430" y="400" font-size="15" font-weight="600" fill="#1e293b" text-anchor="middle">Flash-sale service</text>
  <text x="430" y="416" font-size="11" fill="#64748b" text-anchor="middle">own cluster; all state in Redis / Kafka</text>

  <!-- flash-sale <-> Redis : synchronous reserve (red, double-headed) -->
  <text x="645" y="374" font-size="10.5" font-weight="700" fill="#b91c1c" text-anchor="middle">DECR +</text>
  <text x="645" y="388" font-size="10.5" font-weight="700" fill="#b91c1c" text-anchor="middle">SET NX ⇄</text>
  <line x1="610" y1="402" x2="680" y2="402" stroke="#b91c1c" stroke-width="2.5" marker-start="url(#arrowRed)" marker-end="url(#arrowRed)"/>
  <text x="645" y="418" font-size="9.5" fill="#b91c1c" text-anchor="middle">reserve (sync)</text>

  <!-- flash-sale -> payment (sync) -->
  <line x1="430" y1="424" x2="430" y2="464" stroke="#b91c1c" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="446" y="448" font-size="10.5" font-weight="600" fill="#b91c1c">reserved → /checkout</text>

  <g filter="url(#shadow)"><rect x="250" y="464" width="360" height="70" rx="10" fill="#ffffff" stroke="#fbbf24"/></g>
  <text x="430" y="488" font-size="14.5" font-weight="700" fill="#92400e" text-anchor="middle">Payment Service (idempotent)</text>
  <text x="430" y="508" font-size="10.5" fill="#64748b" text-anchor="middle">Idempotency-Key — retries never double-charge</text>
  <text x="430" y="524" font-size="10.5" font-weight="700" fill="#b91c1c" text-anchor="middle">re-validate reservation BEFORE charge</text>

  <!-- payment -> kafka (async) -->
  <line x1="430" y1="534" x2="430" y2="570" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="446" y="556" font-size="10.5" font-weight="600" fill="#334155">payment success = commit → emit</text>

  <g filter="url(#shadow)"><rect x="250" y="570" width="360" height="60" rx="10" fill="#ffffff" stroke="#c084fc"/></g>
  <text x="430" y="592" font-size="10" font-weight="700" fill="#7e22ce" text-anchor="middle" letter-spacing="1">⑤ ASYNC DURABILITY — EVENTUAL</text>
  <text x="430" y="610" font-size="14" font-weight="700" fill="#6b21a8" text-anchor="middle">Kafka: order-events</text>
  <text x="430" y="625" font-size="10.5" fill="#64748b" text-anchor="middle">durable · replayable · partitioned</text>

  <!-- kafka -> workers -->
  <line x1="430" y1="630" x2="430" y2="666" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)"><rect x="270" y="666" width="320" height="54" rx="10" fill="#ffffff" stroke="#c084fc"/></g>
  <text x="430" y="689" font-size="13.5" font-weight="600" fill="#1e293b" text-anchor="middle">Consumer workers (at-least-once)</text>
  <text x="430" y="707" font-size="10.5" fill="#64748b" text-anchor="middle">idempotent upsert keyed by order / idempotency key</text>

  <!-- workers -> orders db / notifications -->
  <path d="M360,720 L360,752 L230,752 L230,780" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M500,720 L500,752 L628,752 L628,780" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)"><rect x="90" y="780" width="280" height="64" rx="10" fill="#ffffff" stroke="#a78bfa"/></g>
  <text x="230" y="806" font-size="13.5" font-weight="700" fill="#5b21b6" text-anchor="middle">Orders DB (Postgres / Aurora)</text>
  <text x="230" y="825" font-size="10.5" fill="#64748b" text-anchor="middle">ACID source of truth · 5,000 orders is trivial</text>
  <text x="230" y="839" font-size="9.5" fill="#94a3b8" text-anchor="middle">written async behind Kafka</text>

  <g filter="url(#shadow)"><rect x="488" y="780" width="280" height="64" rx="10" fill="#ffffff" stroke="#a78bfa"/></g>
  <text x="628" y="806" font-size="13.5" font-weight="700" fill="#5b21b6" text-anchor="middle">Notifications (Email / SMS)</text>
  <text x="628" y="825" font-size="10.5" fill="#64748b" text-anchor="middle">"order confirmed" + shipping updates</text>
  <text x="628" y="839" font-size="9.5" fill="#94a3b8" text-anchor="middle">slow provider never gates checkout</text>

  <!-- ============ ④ REDIS panel (side, synchronous dependency) ============ -->
  <rect x="680" y="360" width="500" height="352" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="700" y="384" font-size="14" font-weight="700" fill="#b91c1c">④ SCARCITY ARBITER — Redis Cluster (isolated datastore)</text>
  <text x="700" y="402" font-size="10.5" fill="#b91c1c">single-threaded atomic per key · sharded · TTL holds · replicas → failover</text>

  <!-- guard -->
  <g filter="url(#shadow)"><rect x="698" y="412" width="228" height="90" rx="10" fill="#ffffff" stroke="#f87171"/></g>
  <text x="812" y="435" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">Per-user guard</text>
  <text x="812" y="455" font-size="11" fill="#334155" text-anchor="middle">SET reserved:{userId} 1 NX</text>
  <text x="812" y="473" font-size="10" fill="#64748b" text-anchor="middle">already set → ALREADY_RESERVED</text>
  <text x="812" y="489" font-size="10" fill="#64748b" text-anchor="middle">one unit per user (no double-tap)</text>

  <!-- guard -> counters -->
  <line x1="926" y1="457" x2="942" y2="457" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- shard counters -->
  <g filter="url(#shadow)"><rect x="944" y="412" width="228" height="90" rx="10" fill="#ffffff" stroke="#f87171"/></g>
  <text x="1058" y="433" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">Sharded stock counters</text>
  <text x="1058" y="450" font-size="10" fill="#64748b" text-anchor="middle">userId % 10 → DECR stock:{k}</text>
  <g font-size="9.5" fill="#1e293b" text-anchor="middle">
    <rect x="956" y="456" width="96" height="24" rx="5" fill="#fee2e2" stroke="#fca5a5"/><text x="1004" y="472">stock:0=500</text>
    <rect x="1058" y="456" width="96" height="24" rx="5" fill="#f1f5f9" stroke="#cbd5e1"/><text x="1106" y="472">…:9=500</text>
  </g>
  <text x="1058" y="494" font-size="9.8" fill="#334155" text-anchor="middle">Σ = 5,000 · DECR ≥ 0 → RESERVED · else SOLD_OUT</text>

  <!-- reservation hold -->
  <g filter="url(#shadow)"><rect x="698" y="510" width="228" height="90" rx="10" fill="#ffffff" stroke="#f87171"/></g>
  <text x="812" y="533" font-size="12.5" font-weight="700" fill="#991b1b" text-anchor="middle">Reservation hold — 2nd phase</text>
  <text x="812" y="553" font-size="11" fill="#334155" text-anchor="middle">reservation:{userId} EX 180s</text>
  <text x="812" y="571" font-size="10" fill="#64748b" text-anchor="middle">= the checkout window; TTL auto-</text>
  <text x="812" y="587" font-size="10" fill="#64748b" text-anchor="middle">releases abandoned holds (no sweeper)</text>

  <!-- state machine -->
  <g filter="url(#shadow)"><rect x="944" y="510" width="228" height="90" rx="10" fill="#ffffff" stroke="#f87171"/></g>
  <text x="1058" y="533" font-size="12.5" font-weight="700" fill="#991b1b" text-anchor="middle">Reserve → Pay → Sold</text>
  <text x="1058" y="554" font-size="9.8" fill="#334155" text-anchor="middle">AVAILABLE →(DECR) RESERVED(TTL)</text>
  <text x="1058" y="570" font-size="9.8" fill="#334155" text-anchor="middle">→(pay) SOLD</text>
  <text x="1058" y="588" font-size="9.8" fill="#9f1239" text-anchor="middle">TTL expires → INCR stock → AVAILABLE</text>

  <!-- control strip -->
  <rect x="698" y="608" width="474" height="86" rx="8" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="935" y="630" font-size="11.5" font-weight="700" fill="#991b1b" text-anchor="middle">Control keys (cosmetic / edge)</text>
  <text x="935" y="650" font-size="10" fill="#64748b" text-anchor="middle">global:sold_out  →  edge fast-path rejects without touching Redis</text>
  <text x="935" y="668" font-size="10" fill="#64748b" text-anchor="middle">sold = 5,000 − Σ shards  →  refreshed every 1–2s, served via CDN (approximate)</text>
  <text x="935" y="686" font-size="10" fill="#94a3b8" text-anchor="middle">both kept OFF the hot inventory keys</text>

  <!-- re-validate link from Payment to reservation-hold box -->
  <path d="M610,500 L644,500 L644,555 L698,555" fill="none" stroke="#b91c1c" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrowRed)"/>
  <text x="654" y="492" font-size="9.5" font-weight="600" fill="#b91c1c" text-anchor="middle">re-check owned</text>

  <!-- ============ AUX / BATCH column ============ -->
  <rect x="1200" y="360" width="258" height="352" rx="12" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="1329" y="384" font-size="12.5" font-weight="700" fill="#334155" letter-spacing="1" text-anchor="middle">AUX / BATCH (in-cluster)</text>

  <g filter="url(#shadow)"><rect x="1214" y="396" width="230" height="72" rx="9" fill="#ffffff" stroke="#94a3b8"/></g>
  <text x="1329" y="418" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">Sold counter</text>
  <text x="1329" y="436" font-size="9.8" fill="#64748b" text-anchor="middle">5,000 − Σ shards every 1–2s</text>
  <text x="1329" y="450" font-size="9.8" fill="#64748b" text-anchor="middle">→ cached → CDN</text>
  <text x="1329" y="463" font-size="9.5" fill="#94a3b8" text-anchor="middle">never reads hot keys at 170k/s</text>

  <g filter="url(#shadow)"><rect x="1214" y="478" width="230" height="72" rx="9" fill="#ffffff" stroke="#94a3b8"/></g>
  <text x="1329" y="500" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">TTL expiry / key-expiry hook</text>
  <text x="1329" y="518" font-size="9.8" fill="#64748b" text-anchor="middle">on reservation expire → INCR stock</text>
  <text x="1329" y="532" font-size="9.8" fill="#64748b" text-anchor="middle">returns abandoned unit within ms</text>
  <text x="1329" y="545" font-size="9.5" fill="#94a3b8" text-anchor="middle">no polling on the hot row</text>

  <g filter="url(#shadow)"><rect x="1214" y="560" width="230" height="66" rx="9" fill="#ffffff" stroke="#94a3b8"/></g>
  <text x="1329" y="582" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">Reconciliation</text>
  <text x="1329" y="600" font-size="9.8" fill="#64748b" text-anchor="middle">shard failover → recover stranded</text>
  <text x="1329" y="614" font-size="9.8" fill="#64748b" text-anchor="middle">stock; orders vs sold count</text>

  <g filter="url(#shadow)"><rect x="1214" y="636" width="230" height="66" rx="9" fill="#ffffff" stroke="#94a3b8"/></g>
  <text x="1329" y="658" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="middle">Auto-refund safety net</text>
  <text x="1329" y="676" font-size="9.8" fill="#64748b" text-anchor="middle">charge landed but hold gone →</text>
  <text x="1329" y="690" font-size="9.8" fill="#64748b" text-anchor="middle">refund + notify (never silent)</text>

  <!-- dashed links: aux <-> Redis panel -->
  <line x1="1214" y1="432" x2="1180" y2="470" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>
  <line x1="1214" y1="514" x2="1180" y2="555" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>

  <!-- ============ LEGEND (horizontal, bottom) ============ -->
  <g transform="translate(40,898)">
    <rect x="0" y="0" width="1440" height="70" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="27" font-size="13.5" font-weight="700" fill="#0f172a">Legend</text>
    <line x1="20" y1="50" x2="54" y2="50" stroke="#b91c1c" stroke-width="2.5" marker-start="url(#arrowRed)" marker-end="url(#arrowRed)"/>
    <text x="62" y="54" font-size="11.5" fill="#334155">Hot / sync path — user waits (reserve + pay)</text>
    <line x1="360" y1="50" x2="394" y2="50" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="402" y="54" font-size="11.5" fill="#334155">Async — off the critical path</text>
    <line x1="640" y1="50" x2="674" y2="50" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>
    <text x="682" y="54" font-size="11.5" fill="#334155">Batch / background</text>
    <rect x="880" y="42" width="18" height="12" rx="3" fill="none" stroke="#0f766e" stroke-dasharray="4 3"/>
    <text x="906" y="52" font-size="11" fill="#334155">Isolated cluster boundary</text>
    <text x="1120" y="30" font-size="11.5" font-weight="700" fill="#991b1b">Strong:</text>
    <text x="1120" y="52" font-size="10.5" fill="#475569">reservation counter (DECR) + payment→order commit</text>
    <text x="1120" y="66" font-size="10.5" fill="#6b21a8" font-weight="700">Eventual: sold badge · Orders DB row · email</text>
  </g>
</svg>
